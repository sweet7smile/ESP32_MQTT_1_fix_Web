<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESPHomeMQTT 控制台</title>
<link rel="icon" href="assets/IoT-icon.png">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div class="app">

  <header class="app-header">
    <img src="assets/IoT-icon.png" alt="" class="app-icon">
    <h1>ESPHomeMQTT 控制台</h1>
    <!-- bump this together with app.js's ?v= query string below on every release -->
    <span class="version-badge">V3</span>
  </header>

  <section class="card">
    <h2 class="card-title">連線設定</h2>
    <div class="conn-grid">
      <label class="field">
        <span>Broker</span>
        <input id="broker" type="text" value="mqttgo.io" placeholder="Hostname or IP" autocomplete="off">
      </label>
      <label class="field field-narrow">
        <span>Port</span>
        <input id="port" type="number" value="8084" inputmode="numeric">
      </label>
      <label class="field field-narrow">
        <span>Path</span>
        <input id="path" type="text" value="/mqtt" autocomplete="off">
      </label>
      <label class="field field-checkbox">
        <input id="secure" type="checkbox" checked>
        <span>WSS 加密連線</span>
      </label>
      <div class="conn-buttons">
        <button id="btnConnect" class="btn btn-primary">Connect</button>
        <button id="btnDisconnect" class="btn btn-danger" hidden>Disconnect</button>
        <img id="imgConnected" src="assets/not_ok.png" alt="connection status" class="conn-icon">
      </div>
    </div>
    <div class="state-row">
      <span>State:</span>
      <span id="lblState" class="state-value">Disconnected</span>
    </div>
  </section>

  <section class="card dashboard-card">
    <div class="dash-toolbar">
      <h2 class="card-title">儀表板</h2>
      <div class="dash-toolbar-actions">
        <button id="btnAddWidget" class="btn btn-add" type="button" hidden>+ 新增元件</button>
        <button id="btnEditMode" class="btn btn-edit" type="button">編輯</button>
      </div>
    </div>
    <div id="grid" class="grid"></div>
  </section>

  <section class="card">
    <div class="log-header">
      <h2 class="card-title">訊息 Log</h2>
      <button id="btnClearLog" class="btn btn-clear" type="button">清除</button>
    </div>
    <div id="msgLog" class="log-box"></div>
  </section>

</div>

<div id="addMenuOverlay" class="overlay" hidden>
  <div class="add-menu">
    <h3>新增元件</h3>
    <button class="add-menu-item" data-type="button" type="button">🔘 按鈕</button>
    <button class="add-menu-item" data-type="switch" type="button">🔀 開關</button>
    <button class="add-menu-item" data-type="slider" type="button">🎚️ 拉桿</button>
    <button class="add-menu-item" data-type="led" type="button">💡 LED 燈</button>
    <button class="add-menu-item" data-type="label" type="button">🏷️ 標籤</button>
    <button id="btnCancelAdd" class="btn btn-clear" type="button">取消</button>
  </div>
</div>

<div id="configOverlay" class="overlay" hidden>
  <div class="modal">
    <h3 id="configTitle">設定元件</h3>
    <div id="configFields" class="config-fields"></div>
    <div class="modal-actions">
      <button id="btnDeleteWidget" class="btn btn-danger" type="button">刪除</button>
      <button id="btnCancelConfig" class="btn btn-clear" type="button">取消</button>
      <button id="btnSaveConfig" class="btn btn-primary" type="button">儲存</button>
    </div>
  </div>
</div>

<script src="vendor/mqtt.min.js"></script>
<script src="app.js?v=3"></script>
</body>
</html>
